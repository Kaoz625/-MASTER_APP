name: master_app
description: Master App - Universal app foundation with authentication, payments, and multi-platform support
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  
  # Firebase (Latest)
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  google_sign_in: ^6.2.0
  firebase_messaging: ^16.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  
  # Supabase (Latest - Backup)
  supabase_flutter: ^2.8.0
  
  # State Management (Latest)
  provider: ^6.1.2
  riverpod: ^2.6.0
  bloc: ^9.1.0
  flutter_bloc: ^9.1.0
  
  # Navigation (Latest)
  go_router: ^17.0.0
  
  # API (Latest)
  dio: ^5.7.0
  http: ^1.2.2
  
  # Local Storage (Latest)
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.3
  
  # UI Components (Latest)
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0
  lottie: ^3.2.0
  
  # Biometrics (Latest)
  local_auth: ^3.0.0
  
  # Location (Latest)
  geolocator: ^13.0.0
  geolocator_apple: ^2.3.0
  geolocator_android: ^4.6.0
  google_maps_flutter: ^2.10.0
  google_maps_flutter_android: ^2.14.0
  google_maps_flutter_ios: ^2.8.0
  
  # Input Validation (Latest)
  form_field_validator: ^1.1.0
  email_validator: ^3.0.0
  
  # Date Formatting (Latest)
  intl: ^0.20.2
  
  # Voice (Latest)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.1.0
  
  # URL Launcher (Latest)
  url_launcher: ^6.3.1
  
  # Share (Latest)
  share_plus: ^10.1.2
  
  # Package Info (Latest)
  package_info_plus: ^8.3.0
  
  # Image Picker (Latest)
  image_picker: ^1.1.2
  
  # Permissions (Latest)
  permission_handler: ^12.0.0
  
  # Web View (Latest)
  webview_flutter: ^4.13.0
  webview_flutter_android: ^4.0.0
  webview_flutter_wkwebview: ^3.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/locales/

flutter_intl:
  enabled: true
  generate: true
  output_dir: lib/l10n
